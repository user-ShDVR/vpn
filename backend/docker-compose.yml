services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    profiles: ["prod"]

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s
    environment:
      DATABASE_URL: postgres://vpn:vpn@db:5432/vpn?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: "8080"
      MIGRATIONS_PATH: /app/migrations
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      WEB_STATIC_PATH: /app/web/static
      PALLY_TOKEN: ${PALLY_TOKEN:-}
      PALLY_SHOP_ID: ${PALLY_SHOP_ID:-}
      PALLY_BASE_URL: ${PALLY_BASE_URL:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/app/migrations:ro

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: vpn
      POSTGRES_USER: vpn
      POSTGRES_PASSWORD: vpn
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  caddy_data:
  caddy_config:
