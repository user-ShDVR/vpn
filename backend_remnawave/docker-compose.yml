services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@svyazok.ru}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  api:
    build: .
    restart: unless-stopped
    expose:
      - "8080"
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s
    environment:
      DATABASE_URL: postgres://vpn:vpn@db:5432/vpn?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: "8080"
      MIGRATIONS_PATH: /app/migrations
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      WEB_STATIC_PATH: /app/web/static
      REMNAWAVE_BASE_URL: ${REMNAWAVE_BASE_URL:-}
      REMNAWAVE_TOKEN: ${REMNAWAVE_TOKEN:-}
      PLATEGA_BASE_URL: ${PLATEGA_BASE_URL:-}
      PLATEGA_MERCHANT_ID: ${PLATEGA_MERCHANT_ID:-}
      PLATEGA_SECRET: ${PLATEGA_SECRET:-}
      PLATEGA_PAYMENT_METHOD: ${PLATEGA_PAYMENT_METHOD:-1}
      PLATEGA_RETURN_URL: ${PLATEGA_RETURN_URL:-}
      PLATEGA_FAIL_URL: ${PLATEGA_FAIL_URL:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@svyazok.ru}
      SMTP_TLS_MODE: ${SMTP_TLS_MODE:-starttls}
      SUPPORT_TG_URL: ${SUPPORT_TG_URL:-}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-}
      SUPPORT_FAQ_URL: ${SUPPORT_FAQ_URL:-}
      REQUIRE_EMAIL_VERIFY: ${REQUIRE_EMAIL_VERIFY:-false}
      YANDEX_METRIKA_ID: ${YANDEX_METRIKA_ID:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/app/migrations:ro

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: vpn
      POSTGRES_USER: vpn
      POSTGRES_PASSWORD: vpn
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  caddy_data:
  caddy_config:
